server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /assets-test/ {
        alias /usr/share/nginx/html/assets-test/;
        autoindex off;
        add_header Content-Disposition "attachment";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
